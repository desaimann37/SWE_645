services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./test.db}

  agent:
    build: ./agent
    ports:
      - "9000:9000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MCP_SERVER_URL=http://backend:8000/mcp
      - AGENT_PORT=9000
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_AGENT_URL=http://localhost:9000
    depends_on:
      - backend
      - agent
