apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app: {{ .Release.Name }}
type: Opaque
data:
  # anthropicApiKeyB64 must be a base64-encoded string.
  # Set it in values.yaml or override with:
  #   helm install ... --set secrets.anthropicApiKeyB64=$(echo -n 'sk-ant-...' | base64)
  anthropic-api-key: {{ .Values.secrets.anthropicApiKeyB64 | default "" | quote }}
  # databaseUrlB64 is optional; leave empty to use the SQLite default in the backend.
  database-url: {{ .Values.secrets.databaseUrlB64 | default "" | quote }}
